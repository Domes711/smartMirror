<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>MMM-Profile · animation demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@100;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../MMM-Profile.css">
    <style>
        html, body {
            background: #000; color: #fff;
            font-family: "Roboto Condensed", sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
        }
        .stage {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 280px;
        }
        .legend {
            position: fixed;
            bottom: 18px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            color: #555;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        .legend a {
            color: #888;
            text-decoration: none;
            margin: 0 8px;
        }
        .legend a:hover { color: #fff; }
    </style>
</head>
<body>
    <div class="stage">
        <div id="mount"></div>
    </div>
    <div class="legend">
        <a href="#asleep">asleep</a>
        <a href="#scanning">scanning</a>
        <a href="#user">user</a>
        <a href="#unknown">unknown</a>
    </div>

    <script>
        // Stub the MagicMirror framework just enough that MMM-Profile can
        // run as a plain browser script.
        window.Log = console;
        window.Module = {
            _def: null,
            register: function (name, def) { this._def = def; }
        };
        // _project() reaches into MM.getModules() — give it an empty list
        // so the indicator-only demo doesn't fail.
        window.MM = {
            getModules: function () {
                return { enumerate: function () { return []; } };
            }
        };
    </script>
    <script src="../MMM-Profile.js"></script>

    <script>
        const def = window.Module._def;
        const mountEl = document.getElementById("mount");

        const mod = Object.assign({}, def);
        mod.config = Object.assign({}, def.defaults, {
            defaultUser: "default",
            scanningLabel: "scanning",
            unknownLabel: "Unknown"
        });
        mod.state = "asleep";
        mod.currentUser = null;
        mod.activeLayout = [];
        mod.activeLayoutKey = null;
        mod.domReady = true;
        mod.updateDom = function () {
            const el = this.getDom();
            mountEl.innerHTML = "";
            mountEl.appendChild(el);
        };
        mod.sendSocketNotification = function () {};

        const scenarios = {
            asleep:   { state: "asleep",   currentUser: null,      layout: [] },
            scanning: { state: "scanning", currentUser: null,      layout: [] },
            user:     { state: "user",     currentUser: "Domes",   layout: [] },
            unknown:  { state: "user",     currentUser: "default", layout: [] }
        };

        function apply() {
            const name = (location.hash || "#scanning").slice(1);
            const s = scenarios[name] || scenarios.scanning;
            // Drive the same code path the helper would: feed an MMP_STATE
            // notification into the socket handler.
            mod.socketNotificationReceived("MMP_STATE", s);
        }
        window.addEventListener("hashchange", apply);
        apply();
    </script>
</body>
</html>
