<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>MMM-GoogleCalendar · preview (current upstream)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@100;300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="./calendar.css">
<style>
  /* Subset of MagicMirror's base CSS so the calendar renders the
     same way it does on the mirror. */
  :root {
    --font-size: 20px;
    --font-size-small: 17.5px;
    --font-primary: "Roboto Condensed", sans-serif;
    --color-text: #fff;
    --color-text-dimmed: #aaa;
    --color-text-bright: #fff;
    --gap-body-top: 60px;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: var(--color-text);
    font-family: var(--font-primary);
    font-size: var(--font-size);
    font-weight: 400;
    line-height: 1.4;
  }

  .stage {
    padding: 40px 60px;
    display: grid;
    grid-template-columns: 1fr;
    gap: 40px;
    max-width: 600px;
  }

  .module {
    display: block;
  }

  .module-header {
    font-size: 15px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid #666;
    padding-bottom: 6px;
    margin-bottom: 12px;
    line-height: 1;
    color: #fff;
  }

  .small {
    font-size: var(--font-size-small);
    line-height: 1.25;
  }

  .normal { color: var(--color-text); }
  .dimmed { color: var(--color-text-dimmed); }
  .bright { color: var(--color-text-bright); font-weight: 400; }
  .light  { font-weight: 300; }
  .thin   { font-weight: 100; }

  .align-right { text-align: right; }

  table {
    border-collapse: collapse;
    width: 100%;
  }

  td {
    padding: 1px 0;
    vertical-align: top;
  }

  /* Note: this is a static replica of what getDom() produces with
     timeFormat: "dateheaders" (the default). When config differs,
     the markup differs too. */
</style>
</head>
<body>

<div class="stage">

  <!-- ============ Today's events only ============ -->
  <div class="module">
    <header class="module-header">Moro systems</header>
    <table class="small">
      <tr class="normal">
        <td colspan="3" style="padding-top: 10px;">Ne, 26.4.</td>
      </tr>
      <tr class="normal event">
        <td class="symbol align-right"><span class="fa fa-fw fa-calendar-week"></span></td>
        <td class="title bright">Ranní káva</td>
        <td class="time light">8:30</td>
      </tr>
      <tr class="normal event">
        <td class="symbol align-right"><span class="fa fa-fw fa-calendar-week"></span></td>
        <td class="title bright">Daily standup</td>
        <td class="time light">10:00</td>
      </tr>
      <tr class="normal event">
        <td class="symbol align-right"><span class="fa fa-fw fa-calendar-week"></span></td>
        <td class="title bright">Lunch · Veverka</td>
        <td class="time light">13:00</td>
      </tr>
      <tr class="normal event">
        <td class="symbol align-right"><span class="fa fa-fw fa-calendar-week"></span></td>
        <td class="title bright">1:1 s Honzou</td>
        <td class="time light">15:30</td>
      </tr>
      <tr class="normal event">
        <td class="symbol align-right"><span class="fa fa-fw fa-calendar-week"></span></td>
        <td class="title bright">Workshop · UX review</td>
        <td class="time light">17:00 – 18:30</td>
      </tr>
    </table>
  </div>

</div>

</body>
</html>
