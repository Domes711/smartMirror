<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<title>MMM-GoogleCalendar · timeline preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@100;300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --hour-height: 64px;       /* px per hour on the timeline */
    --time-col-width: 56px;    /* width of the gutter with hour labels */
    --bg: #000;
    --fg: #fff;
    --grid: rgba(255,255,255,0.10);
    --label: rgba(255,255,255,0.45);
    --card-bg: rgba(255,255,255,0.08);
    --card-bg-hatch: rgba(255,255,255,0.04);
    --card-fg: #fff;
    --card-meta: rgba(255,255,255,0.60);
    --accent-blue:   #5b8def;
    --accent-teal:   #2ecbb4;
    --accent-purple: #8a5bef;
    --accent-orange: #ff9b3c;
    --accent-pink:   #ff5b8a;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: "Roboto Condensed", sans-serif;
    font-weight: 400;
  }

  .stage {
    padding: 32px 40px 56px;
    max-width: 520px;
  }

  .module-header {
    font-size: 14px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid rgba(255,255,255,0.25);
    padding-bottom: 6px;
    margin-bottom: 14px;
    line-height: 1;
    color: rgba(255,255,255,0.85);
  }

  .day-label {
    font-size: 13px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.5px;
    margin: 4px 0 10px;
    text-transform: capitalize;
  }

  /* Timeline -------------------------------------------------------- */
  .timeline {
    position: relative;
    padding-left: var(--time-col-width);
  }

  /* Hour rows: each is hour-height tall, with a top border that
     forms the gridline. */
  .hour-row {
    position: relative;
    height: var(--hour-height);
    border-top: 1px solid var(--grid);
  }
  .hour-row:last-child { border-bottom: 1px solid var(--grid); }

  .hour-row .hour-label {
    position: absolute;
    left: calc(-1 * var(--time-col-width));
    top: -7px;
    width: calc(var(--time-col-width) - 12px);
    text-align: right;
    font-size: 12px;
    color: var(--label);
    letter-spacing: 0.3px;
  }

  /* Event card. Positioned absolutely against the .timeline so it
     can span multiple hours. Use top: var(--start) and
     height: var(--span) where 1 hour == --hour-height. */
  .event {
    position: absolute;
    left: 6px;
    right: 6px;
    border-radius: 8px;
    padding: 8px 10px 9px 12px;
    background: var(--card-bg);
    color: var(--card-fg);
    overflow: hidden;
    line-height: 1.2;
    border-left: 3px solid var(--accent-blue);
    z-index: 2;
  }

  .event .title {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event .meta {
    margin-top: 3px;
    font-size: 12px;
    color: var(--card-meta);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .event .meta svg {
    width: 11px; height: 11px;
    fill: none;
    stroke: currentColor;
    stroke-width: 1.5;
  }

  /* Calendar color variants — set the left bar + a tinted bg. */
  .event.cal-blue   { border-left-color: var(--accent-blue);
                      background: rgba(91,141,239,0.18); }
  .event.cal-teal   { border-left-color: var(--accent-teal);
                      background: rgba(46,203,180,0.18); }
  .event.cal-purple { border-left-color: var(--accent-purple);
                      background: rgba(138,91,239,0.18); }
  .event.cal-orange { border-left-color: var(--accent-orange);
                      background: rgba(255,155,60,0.18); }
  .event.cal-pink   { border-left-color: var(--accent-pink);
                      background: rgba(255,91,138,0.18); }

  /* Tentative / pending events use a hatched background. */
  .event.tentative {
    background: repeating-linear-gradient(
      135deg,
      rgba(255,255,255,0.05) 0 6px,
      rgba(255,255,255,0.10) 6px 7px
    );
  }
  .event.tentative.cal-blue {
    background:
      repeating-linear-gradient(
        135deg,
        rgba(91,141,239,0.12) 0 6px,
        rgba(91,141,239,0.22) 6px 7px);
  }

  /* Side-by-side overlap (two events at same time). */
  .event.col-l { right: 51%; }
  .event.col-r { left: 51%; }

  /* Now-line: thin red line marking current time. */
  .now-line {
    position: absolute;
    left: calc(-1 * var(--time-col-width));
    right: 6px;
    height: 0;
    border-top: 1.5px solid #ff3b30;
    z-index: 5;
    pointer-events: none;
  }
  .now-line::before {
    content: "";
    position: absolute;
    left: calc(var(--time-col-width) - 4px);
    top: -4px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #ff3b30;
  }
</style>
</head>
<body>

<div class="stage">
  <header class="module-header">Moro systems</header>
  <div class="day-label">Neděle 26. 4. 2026</div>

  <!-- 8:00 → 21:00. Events use top: (start - 8h) * --hour-height
       and height: duration * --hour-height -->
  <div class="timeline">

    <!-- Now-line at 11:49 -->
    <div class="now-line" style="top: calc((3 + 49/60) * var(--hour-height));"></div>

    <!-- Events -->
    <div class="event cal-orange" style="
         top: calc(0.5 * var(--hour-height));
         height: calc(0.75 * var(--hour-height));">
      <div class="title">Snídaně doma</div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><path d="M12 21s-7-5.5-7-11a4 4 0 0 1 7-2.6A4 4 0 0 1 19 10c0 5.5-7 11-7 11z"/></svg>
        Kuchyně
      </div>
    </div>

    <div class="event cal-blue" style="
         top: calc(2 * var(--hour-height));
         height: calc(0.5 * var(--hour-height));">
      <div class="title">Daily standup</div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/></svg>
        Google Meet
      </div>
    </div>

    <div class="event cal-teal" style="
         top: calc(5 * var(--hour-height));
         height: calc(1 * var(--hour-height));">
      <div class="title">Lunch · Veverka</div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/></svg>
        Veverka, Brno
      </div>
    </div>

    <div class="event cal-purple" style="
         top: calc(7.5 * var(--hour-height));
         height: calc(0.5 * var(--hour-height));">
      <div class="title">1:1 s Honzou</div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/></svg>
        Kancelář
      </div>
    </div>

    <!-- Two parallel events 17:00 – 18:30 / 17:00 – 18:00 -->
    <div class="event cal-blue tentative col-l" style="
         top: calc(9 * var(--hour-height));
         height: calc(1.5 * var(--hour-height));">
      <div class="title">#8524932112: From Přerov</div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/></svg>
        Sta., Přerov
      </div>
    </div>
    <div class="event cal-teal col-r" style="
         top: calc(9 * var(--hour-height));
         height: calc(1 * var(--hour-height));">
      <div class="title">Train to MS</div>
      <div class="meta">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 21s-7-5.5-7-11a7 7 0 0 1 14 0c0 5.5-7 11-7 11z"/></svg>
        Sta., Přerov
      </div>
    </div>

    <!-- Hour grid -->
    <div class="hour-row"><span class="hour-label">8:00</span></div>
    <div class="hour-row"><span class="hour-label">9:00</span></div>
    <div class="hour-row"><span class="hour-label">10:00</span></div>
    <div class="hour-row"><span class="hour-label">11:00</span></div>
    <div class="hour-row"><span class="hour-label">12:00</span></div>
    <div class="hour-row"><span class="hour-label">13:00</span></div>
    <div class="hour-row"><span class="hour-label">14:00</span></div>
    <div class="hour-row"><span class="hour-label">15:00</span></div>
    <div class="hour-row"><span class="hour-label">16:00</span></div>
    <div class="hour-row"><span class="hour-label">17:00</span></div>
    <div class="hour-row"><span class="hour-label">18:00</span></div>
    <div class="hour-row"><span class="hour-label">19:00</span></div>
    <div class="hour-row"><span class="hour-label">20:00</span></div>
    <div class="hour-row"><span class="hour-label">21:00</span></div>
  </div>
</div>

</body>
</html>
